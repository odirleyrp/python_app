apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: python-app
  namespace: my-app
spec:
  rules:
  - host: "bora.local"
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: python-app
            port:
              number: 80
